aid: qliksense
name: Qlik Sense APIs
description: >-
  Collection of APIs for Qlik Sense, a business intelligence and visual analytics
  platform. Qlik provides REST APIs, WebSocket APIs, and developer tools for
  managing cloud tenants, applications, data connections, users, automations,
  and AI-powered analytics through the Qlik Cloud platform.
type: Index
image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
url: >-
  https://raw.githubusercontent.com/api-evangelist/qliksense/refs/heads/main/apis.yml
created: '2024-01-15'
modified: '2026-04-18'
specificationVersion: '0.19'
tags:
  - Analytics
  - Business Intelligence
  - Cloud
  - Data Visualization
  - Enterprise
apis:
  - aid: qliksense:engine-api
    name: Qlik Engine API
    description: >-
      JSON-RPC WebSocket API for interacting with the Qlik Associative Engine,
      creating and manipulating apps, and building visualizations.
    humanURL: https://qlik.dev/apis/json-rpc/qix
    baseURL: wss://your-tenant.qlikcloud.com/app/
    tags:
      - Analytics
      - Business Intelligence
      - JSON-RPC
      - WebSocket
    properties:
      - type: Documentation
        url: https://qlik.dev/apis/json-rpc/qix
  - aid: qliksense:apps-api
    name: Qlik Apps API
    description: >-
      Manage Qlik Sense applications including creating, updating, publishing,
      and deleting apps in Qlik Cloud.
    humanURL: https://qlik.dev/apis/rest/apps
    baseURL: https://your-tenant.qlikcloud.com/api/v1/apps
    tags:
      - Applications
      - Apps
      - Cloud
      - REST
    properties:
      - type: Documentation
        url: https://qlik.dev/apis/rest/apps
  - aid: qliksense:users-api
    name: Qlik Users API
